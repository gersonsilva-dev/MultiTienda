<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>TechVenta Pro — Dashboard</title>

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- FUENTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- CSS -->
    <link th:href="@{/css/principal.css}" rel="stylesheet" />

    <style>
        body.rol-cajero .sidebar {
            display: none !important;
        }
        body.rol-cajero .topbar {
            background: #0F172A !important;
            color: white !important;
            border-bottom: none !important;
        }
        body.rol-cajero .topbar .topbar-search {
            display: none !important;
        }
        body.rol-cajero .topbar .topbar-actions .t-btn {
            color: rgba(255,255,255,0.6) !important;
        }
        body.rol-cajero .topbar .topbar-profile .tp-text .tp-name {
            color: white !important;
        }
        body.rol-cajero .topbar .topbar-profile .tp-text .tp-role {
            color: rgba(255,255,255,0.5) !important;
        }
        body.rol-cajero .content-area {
            padding: 0 !important;
        }
    </style>
</head>
<body>

<div class="mobile-overlay" id="mobileOverlay"></div>

<div class="app-shell" id="appShell">

    <!-- ═══════ SIDEBAR ═══════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo-icon" id="logoIcon"><i class="fas fa-store"></i></div>
            <span class="sidebar-logo-text" id="logoText">TechVenta Pro</span>
            <span class="sidebar-logo-badge" id="roleBadge">Admin</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebarUser">
                <!-- 🔥 AVATAR DINÁMICO: Iniciales del usuario -->
                <div class="user-avatar ua-md" id="sidebarAvatar"
                     th:text="${usuario != null ? usuario.nombres.substring(0,1) + usuario.apellidos.substring(0,1) : 'U'}">AD</div>
                <div class="sidebar-user-text">
                    <!-- 🔥 NOMBRE DINÁMICO -->
                    <div class="sidebar-user-name" id="sidebarUserName"
                         th:text="${usuario != null ? usuario.nombres + ' ' + usuario.apellidos : 'Usuario'}">Alan Díaz</div>
                    <!-- 🔥 ROL DINÁMICO -->
                    <div class="sidebar-user-role" id="sidebarUserRole"
                         th:text="${usuario != null ? usuario.rol.nombreRol : 'Rol'}">Administrador</div>
                </div>
            </div>
            <div class="sidebar-version" id="sidebarVersion">TechVenta Pro · v2.0</div>
        </div>
    </aside>

    <!-- ═══════ MAIN WRAPPER ═══════ -->
    <div class="main-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <button class="topbar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>

            <div class="topbar-breadcrumb" id="topbarBc">
                <i class="fas fa-home bc-home"></i>
                <i class="fas fa-chevron-right bc-sep"></i>
                <span class="bc-current" id="bcCurrent">Dashboard</span>
            </div>

            <div class="topbar-search">
                <i class="fas fa-search s-icon"></i>
                <input type="text" placeholder="Buscar en el sistema…" id="globalSearch">
            </div>

            <div class="topbar-actions">
                <!-- Dark mode -->
                <button class="t-btn" onclick="toggleDark()" title="Modo oscuro / claro" aria-label="Cambiar tema">
                    <i class="fas fa-moon" id="darkIcon"></i>
                </button>

                <!-- Notificaciones -->
                <button class="t-btn" onclick="toggleNotif(event)" title="Notificaciones" aria-label="Notificaciones" id="notifBtn">
                    <i class="fas fa-bell"></i>
                    <span class="notif-dot" id="notifDot"></span>
                </button>

                <div class="topbar-divider"></div>

                <!-- Perfil -->
                <div class="topbar-profile" id="topbarProfile" onclick="toggleProfileDd(event)">
                    <!-- 🔥 AVATAR DINÁMICO: Iniciales del usuario -->
                    <div class="user-avatar ua-sm" id="topbarAvatar"
                         th:text="${usuario != null ? usuario.nombres.substring(0,1) + usuario.apellidos.substring(0,1) : 'U'}">AD</div>
                    <div class="tp-text">
                        <!-- 🔥 NOMBRE DINÁMICO -->
                        <div class="tp-name" id="topbarName"
                             th:text="${usuario != null ? usuario.nombres + ' ' + usuario.apellidos : 'Usuario'}">Alan Díaz</div>
                        <!-- 🔥 ROL DINÁMICO -->
                        <div class="tp-role" id="topbarRole"
                             th:text="${usuario != null ? usuario.rol.nombreRol : 'Rol'}">Administrador</div>
                    </div>
                    <i class="fas fa-chevron-down tp-chevron"></i>

                    <div class="profile-dropdown" id="profileDd">
                        <div class="dd-divider"></div>
                        <div class="dd-item danger" onclick="cerrarSesion()">
                            <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- NOTIF PANEL -->
        <div class="notif-panel" id="notifPanel">
            <div class="notif-header">
                <span>Notificaciones</span>
                <span class="notif-mark" onclick="markAllRead()">Marcar leídas</span>
            </div>
            <div class="notif-list" id="notifList"></div>
            <div class="notif-footer">Ver todas</div>
        </div>

        <!-- CONTENT AREA -->
        <div class="content-area" id="contentArea">
            <div class="page-loader" id="pageLoader">
                <div class="loader-spinner"></div>
            </div>
            <main class="main-content" id="mainContent">
                <!-- Se inyecta por JS -->
            </main>
        </div>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MODAL CONFIRMACIÓN REUTILIZABLE -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width:400px">
        <div class="modal-header">
            <div class="modal-title" id="confirmTitle">¿Confirmar acción?</div>
            <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal('confirmModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <p id="confirmMsg" style="font-size:.82rem;color:var(--text-secondary);line-height:1.5">
                Esta acción no se puede deshacer.
            </p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('confirmModal')">Cancelar</button>
            <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    window.USER_ROLE = /*[[${userRole}]]*/ 'admin';
    window.USER_NOMBRES = /*[[${usuario?.nombres}]]*/ 'Usuario';
    window.USER_APELLIDOS = /*[[${usuario?.apellidos}]]*/ '';
    window.USER_ROL = /*[[${usuario?.rol?.nombreRol}]]*/ 'CAJERO';
    
    function cerrarSesion() {
        if (!confirm('¿Estás seguro de cerrar sesión?')) return;
        window.location.href = '/login';
    }
    /*]]>*/
</script>
<script th:src="@{/js/principal.js}"></script>
<script th:src="@{/js/kardex-functions.js}"></script>


</body>
</html>
