<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" th:remove="tag">
    <div class="caja-container">
        <div class="caja-card">
            <div class="caja-card-header">
                <h2><i class="ti ti-cash-register"></i> Apertura de Caja</h2>
                <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:2px;">
                    Para comenzar a vender, debes abrir tu turno de caja
                </div>
            </div>
            <div class="caja-card-body">

                <!-- Info del usuario -->
                <div class="info-box">
                    <i class="ti ti-info-circle"></i>
                    <div>
                        <div class="title" th:text="${usuario.nombres} + ' ' + ${usuario.apellidos}">
                            Bienvenido, Cajero
                        </div>
                        <div class="sub">
                            Asegúrate de que el fondo inicial coincida con el efectivo disponible en la caja.
                        </div>
                    </div>
                </div>

				<!-- DESPUÉS: Muestra la tienda y caja asignadas (solo lectura) -->
				<div class="caja-row">
				    <div class="caja-campo">
				        <label>Tienda asignada</label>
				        <input type="text" class="form-control" 
				               th:value="${usuario.tienda.nombreTienda}" readonly>
				    </div>
				    <div class="caja-campo">
				        <label>Caja asignada</label>
				        <input type="text" class="form-control" 
				               th:value="${usuario.caja.nombreCaja}" readonly>
				    </div>
				</div>

                <!-- Fecha y Hora -->
                <div class="caja-row">
                    <div class="caja-campo">
                        <label>Fecha de apertura</label>
                        <input type="text" id="fechaApertura" 
                               th:value="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}" 
                               readonly class="form-control">
                    </div>
                    <div class="caja-campo">
                        <label>Hora de apertura</label>
                        <input type="text" id="horaApertura" 
                               th:value="${#dates.format(#dates.createNow(), 'HH:mm')}" 
                               readonly class="form-control">
                    </div>
                </div>

                <!-- Fondo Inicial -->
                <div class="caja-campo">
                    <label>Fondo inicial (S/)</label>
                    <input type="number" id="fondoInicial" value="300.00" step="0.50" min="0" class="form-control">
                    <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">
                        Monto en efectivo con el que inicia la caja
                    </div>
                </div>

                <!-- Resumen -->
                <div class="caja-resumen">
                    <div class="caja-resumen-item">
                        <span class="label">Cajero</span>
                        <span class="value" th:text="${usuario.nombres} + ' ' + ${usuario.apellidos}">
                            Juan Pérez
                        </span>
                    </div>
                    <div class="caja-resumen-item">
                        <span class="label">Estado</span>
                        <span class="value" id="estadoCaja" style="color:var(--color-text-danger);">
                            Cerrada
                        </span>
                    </div>
                </div>

                <!-- Botones -->
                <div class="caja-actions">
                    <button class="btn btn-success" id="btnAbrirTurno">
                        <i class="ti ti-check"></i> Abrir Turno
                    </button>
                    <button class="btn btn-outline" onclick="cancelarApertura()">
                        <i class="ti ti-x"></i> Cancelar
                    </button>
                </div>

            </div>
        </div>
    </div>

	<script th:inline="javascript">
	    /*<![CDATA[*/
	    function abrirCaja() {
	        const fondoInicial = document.getElementById('fondoInicial').value;

	        if (parseFloat(fondoInicial) <= 0) {
	            alert('❌ El fondo inicial debe ser mayor a 0.');
	            return;
	        }

	        if (!confirm('¿Confirmar apertura de turno?')) return;

	        const btn = document.getElementById('btnAbrirTurno');
	        const originalText = btn.innerHTML;
	        btn.disabled = true;
	        btn.innerHTML = '<i class="ti ti-loader ti-spin"></i> Abriendo...';

	        // ✅ SOLO ENVIAR EL FONDO INICIAL
	        fetch('/turnos-caja/abrir', {
	            method: 'POST',
	            headers: { 'Content-Type': 'application/json' },
	            body: JSON.stringify({
	                fondoInicial: parseFloat(fondoInicial)
	            })
	        })
	        .then(response => {
	            if (!response.ok) {
	                return response.json().then(err => { 
	                    throw new Error(err.error || 'Error al abrir turno'); 
	                });
	            }
	            return response.json();
	        })
	        .then(data => {
	            if (data.success) {
	                alert('✅ ' + data.message);
	                window.location.href = '/views/venta';
	            } else {
	                alert('❌ ' + (data.message || 'Error desconocido'));
	            }
	        })
	        .catch(error => {
	            alert('❌ Error al abrir turno: ' + error.message);
	            console.error('Error:', error);
	        })
	        .finally(() => {
	            btn.disabled = false;
	            btn.innerHTML = originalText;
	        });
	    }

	    function cancelarApertura() {
	        if (confirm('¿Cancelar apertura de caja?')) {
	            alert('Apertura cancelada.');
	        }
	    }

	    document.addEventListener('DOMContentLoaded', function() {
	        const btn = document.getElementById('btnAbrirTurno');
	        if (btn) {
	            btn.addEventListener('click', abrirCaja);
	        }
	    });
	    /*]]>*/
	</script>
</div>
</html>
