<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tiendas</title>
</head>
<body>
<div class="page-header">
    <div>
        <div class="page-title">🏪 Tiendas</div>
        <div class="page-subtitle">Gestiona las tiendas del sistema</div>
    </div>
    <div class="page-header-right">
        <button class="btn btn-primary" onclick="abrirModalTienda()"><i class="fas fa-plus"></i> Nueva tienda</button>
    </div>
</div>

<div class="table-wrapper">
    <div class="table-scroll">
        <table>
            <thead>
                <tr><th>ID</th><th>Nombre</th><th>Código</th><th>Dirección</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tablaTiendas">
                <tr><td colspan="6" style="text-align:center;padding:40px;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalTienda">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTiendaTitle">Nueva Tienda</div>
            <button class="btn btn-ghost btn-icon btn-sm" onclick="cerrarModalTienda()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="formTienda">
                <input type="hidden" id="tiendaId">
                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" id="tiendaNombre" placeholder="Nombre de la tienda" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Código</label>
                    <input class="form-control" id="tiendaCodigo" placeholder="Código único" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Dirección</label>
                    <input class="form-control" id="tiendaDireccion" placeholder="Dirección completa" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input class="form-control" id="tiendaTelefono" placeholder="Teléfono">
                </div>
                <div class="form-group">
                    <label class="form-label">Correo</label>
                    <input class="form-control" id="tiendaCorreo" type="email" placeholder="correo@tienda.com">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="cerrarModalTienda()">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarTienda()">Guardar</button>
        </div>
    </div>
</div>

<script>
    let tiendasData = [];

    function cargarTiendas() {
        fetch('/api/tiendas')
            .then(r => r.json())
            .then(d => {
                tiendasData = d;
                const tbody = document.getElementById('tablaTiendas');
                if (!d || d.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">No hay tiendas</td></tr>';
                    return;
                }
                tbody.innerHTML = d.map(t => `
                    <tr>
                        <td>${t.idTienda}</td>
                        <td><strong>${t.nombreTienda}</strong></td>
                        <td><span class="badge badge-info">${t.codigoTienda}</span></td>
                        <td>${t.direccion || '-'}</td>
                        <td><span class="badge ${t.activo ? 'badge-success' : 'badge-danger'}">${t.activo ? 'Activa' : 'Inactiva'}</span></td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="editarTienda(${t.idTienda})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-danger btn-sm" onclick="eliminarTienda(${t.idTienda})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            })
            .catch(() => document.getElementById('tablaTiendas').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:red;">Error</td></tr>');
    }

    function abrirModalTienda() {
        document.getElementById('modalTiendaTitle').textContent = 'Nueva Tienda';
        document.getElementById('formTienda').reset();
        document.getElementById('tiendaId').value = '';
        document.getElementById('modalTienda').classList.add('open');
    }

    function cerrarModalTienda() { document.getElementById('modalTienda').classList.remove('open'); }

    function editarTienda(id) {
        const t = tiendasData.find(x => x.idTienda === id);
        if (!t) return;
        document.getElementById('modalTiendaTitle').textContent = 'Editar Tienda';
        document.getElementById('tiendaId').value = t.idTienda;
        document.getElementById('tiendaNombre').value = t.nombreTienda || '';
        document.getElementById('tiendaCodigo').value = t.codigoTienda || '';
        document.getElementById('tiendaDireccion').value = t.direccion || '';
        document.getElementById('tiendaTelefono').value = t.telefono || '';
        document.getElementById('tiendaCorreo').value = t.correoElectronico || '';
        document.getElementById('modalTienda').classList.add('open');
    }

    function guardarTienda() {
        const id = document.getElementById('tiendaId').value;
        const data = {
            nombreTienda: document.getElementById('tiendaNombre').value,
            codigoTienda: document.getElementById('tiendaCodigo').value,
            direccion: document.getElementById('tiendaDireccion').value,
            telefono: document.getElementById('tiendaTelefono').value,
            correoElectronico: document.getElementById('tiendaCorreo').value
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/tiendas/${id}` : '/api/tiendas';
        fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
            .then(r => r.json())
            .then(() => { cerrarModalTienda(); cargarTiendas(); showToast('success', 'Éxito', id ? 'Actualizada' : 'Creada'); })
            .catch(() => showToast('error', 'Error', 'No se pudo guardar'));
    }

    function eliminarTienda(id) {
        if (!confirm('¿Eliminar esta tienda?')) return;
        fetch(`/api/tiendas/${id}`, { method: 'DELETE' })
            .then(() => { cargarTiendas(); showToast('success', 'Eliminada', 'Tienda eliminada'); })
            .catch(() => showToast('error', 'Error', 'No se pudo eliminar'));
    }

    cargarTiendas();
</script>
</body>
</html>
