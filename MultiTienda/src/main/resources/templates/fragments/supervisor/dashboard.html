<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Supervisor</title>
</head>
<body>
<div class="page-header">
    <div>
        <div class="page-title">📊 Dashboard</div>
        <div class="page-subtitle">Bienvenido, <span th:text="${usuario.nombres}"></span> <span th:text="${usuario.apellidos}"></span></div>
    </div>
    <div class="page-header-right">
        <span class="badge badge-primary">Rol: Supervisor</span>
    </div>
</div>

<!-- KPIs -->
<div class="kpi-grid">
    <div class="kpi-card">
        <div class="kpi-label"><i class="fas fa-clock"></i> Solicitudes</div>
        <div class="kpi-value" id="totalSolicitudes">0</div>
        <div class="kpi-delta warn"><i class="fas fa-hourglass-half"></i> Pendientes</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label"><i class="fas fa-ticket-alt"></i> Tickets</div>
        <div class="kpi-value" id="totalTickets">0</div>
        <div class="kpi-delta warn"><i class="fas fa-exclamation-circle"></i> Abiertos</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label"><i class="fas fa-boxes"></i> Stock bajo</div>
        <div class="kpi-value" id="totalStockBajo">0</div>
        <div class="kpi-delta danger"><i class="fas fa-exclamation-triangle"></i> Crítico</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label"><i class="fas fa-store"></i> Tienda</div>
        <div class="kpi-value" id="nombreTienda" style="font-size:1rem;">-</div>
        <div class="kpi-delta up"><span id="tiendaDireccion" style="font-size:0.7rem;">-</span></div>
    </div>
</div>

<!-- Accesos rápidos -->
<div class="grid-3" style="margin-top:18px;">
    <div class="card" onclick="loadView('autorizar')" style="cursor:pointer;transition:transform 0.2s;border:2px solid transparent;" onmouseover="this.style.transform='scale(1.02)';this.style.borderColor='#D97706';" onmouseout="this.style.transform='scale(1)';this.style.borderColor='transparent';">
        <div class="card-body" style="text-align:center;padding:24px;">
            <i class="fas fa-check-circle" style="font-size:2.5rem;color:#D97706;"></i>
            <h4 style="margin-top:10px;">Autorizar</h4>
            <p style="color:var(--text-muted);font-size:0.8rem;">Solicitudes pendientes</p>
        </div>
    </div>
    <div class="card" onclick="loadView('tickets')" style="cursor:pointer;transition:transform 0.2s;border:2px solid transparent;" onmouseover="this.style.transform='scale(1.02)';this.style.borderColor='#D97706';" onmouseout="this.style.transform='scale(1)';this.style.borderColor='transparent';">
        <div class="card-body" style="text-align:center;padding:24px;">
            <i class="fas fa-ticket-alt" style="font-size:2.5rem;color:#D97706;"></i>
            <h4 style="margin-top:10px;">Tickets</h4>
            <p style="color:var(--text-muted);font-size:0.8rem;">Incidencias de tu tienda</p>
        </div>
    </div>
    <div class="card" onclick="loadView('stock')" style="cursor:pointer;transition:transform 0.2s;border:2px solid transparent;" onmouseover="this.style.transform='scale(1.02)';this.style.borderColor='#D97706';" onmouseout="this.style.transform='scale(1)';this.style.borderColor='transparent';">
        <div class="card-body" style="text-align:center;padding:24px;">
            <i class="fas fa-boxes" style="font-size:2.5rem;color:#D97706;"></i>
            <h4 style="margin-top:10px;">Stock crítico</h4>
            <p style="color:var(--text-muted);font-size:0.8rem;">Productos con bajo stock</p>
        </div>
    </div>
</div>

<script>
    function cargarDashboardSupervisor() {
        // ============================================================
        // Solicitudes pendientes (desde BD)
        // ============================================================
        fetch('/api/supervisor/autorizaciones/pendientes')
            .then(r => r.json())
            .then(d => {
                document.getElementById('totalSolicitudes').textContent = d.length || 0;
            })
            .catch(() => {
                document.getElementById('totalSolicitudes').textContent = '0';
            });

        // ============================================================
        // Tickets abiertos (desde BD)
        // ============================================================
        fetch('/api/incidencias')
            .then(r => r.json())
            .then(d => {
                const abiertos = d.filter(i => 
                    i.estadoIncidencia?.nombreEstado === 'ABIERTO' || 
                    i.estadoIncidencia?.nombreEstado === 'EN_PROCESO'
                );
                document.getElementById('totalTickets').textContent = abiertos.length || 0;
            })
            .catch(() => {
                document.getElementById('totalTickets').textContent = '0';
            });

        // ============================================================
        // Stock bajo (desde BD)
        // ============================================================
        fetch('/api/productos')
            .then(r => r.json())
            .then(d => {
                const criticos = d.filter(p => {
                    const stockActual = p.stockMinimo || 0;
                    const stockMinimo = p.stockMinimo || 5;
                    return stockActual < stockMinimo;
                });
                document.getElementById('totalStockBajo').textContent = criticos.length || 0;
            })
            .catch(() => {
                document.getElementById('totalStockBajo').textContent = '0';
            });

        // ============================================================
        // Datos de tienda del supervisor
        // ============================================================
        fetch('/api/tiendas')
            .then(r => r.json())
            .then(d => {
                // Usar tienda con id = 1 (o la del supervisor)
                const tienda = d.find(t => t.idTienda === 1);
                if (tienda) {
                    document.getElementById('nombreTienda').textContent = tienda.nombreTienda || '-';
                    document.getElementById('tiendaDireccion').textContent = tienda.direccion || '-';
                }
            })
            .catch(() => {
                document.getElementById('nombreTienda').textContent = '-';
                document.getElementById('tiendaDireccion').textContent = '-';
            });
    }

    document.addEventListener('DOMContentLoaded', cargarDashboardSupervisor);
</script>
</body>
</html>
