<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" th:remove="tag">
    <div class="misventas-container" style="max-width:800px;margin:0 auto;padding:20px 16px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
        <div class="misventas-card" style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;width:100%;">
            <div class="misventas-card-header" style="padding:14px 18px;border-bottom:1px solid #E2E8F0;background:#F8FAFC;">
                <h2 style="font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;">
                    <i class="ti ti-chart-bar" style="color:#2563EB;"></i> Mis Ventas
                </h2>
                <div style="font-size:12px;color:#94A3B8;margin-top:2px;">
                    Historial de tus ventas realizadas
                </div>
            </div>
            <div class="misventas-card-body" style="padding:18px;">
                <div class="alert alert-info" style="background:#DBEAFE;border-radius:6px;padding:12px 14px;display:flex;align-items:center;gap:10px;border:1px solid #93C5FD;">
                    <i class="ti ti-info-circle" style="font-size:18px;color:#1D4ED8;"></i>
                    <span style="font-size:13px;color:#1E293B;">✅ Página de Mis Ventas funcionando correctamente</span>
                </div>
                <div style="margin-top:16px;text-align:center;padding:30px;background:#F8FAFC;border-radius:6px;border:2px dashed #E2E8F0;">
                    <i class="ti ti-chart-bar" style="font-size:48px;color:#94A3B8;"></i>
                    <p style="margin-top:10px;color:#64748B;">Aquí irá el historial de ventas</p>
                    <p style="font-size:12px;color:#94A3B8;">Próximamente...</p>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
