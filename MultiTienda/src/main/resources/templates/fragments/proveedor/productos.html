<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Productos</title>
</head>
<body>
<div class="page-header">
    <div>
        <div class="page-title">📦 Mis Productos</div>
        <div class="page-subtitle">Productos que ofreces como proveedor</div>
    </div>
    <div class="page-header-right">
        <button class="btn btn-primary" onclick="loadView('subir')"><i class="fas fa-plus"></i> Subir nuevo</button>
    </div>
</div>

<div class="table-wrapper">
    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Código</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos">
                <tr>
                    <td colspan="7" style="text-align:center;padding:40px;">
                        <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;display:block;margin-bottom:10px;"></i>
                        Cargando productos...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    (function() {
        function cargarProductos() {
            console.log('🔍 Cargando productos...');
            
            fetch('/api/productos')
                .then(r => {
                    if (!r.ok) throw new Error('Error al cargar: ' + r.status);
                    return r.json();
                })
                .then(d => {
                    console.log('📦 Datos recibidos:', d);
                    const tbody = document.getElementById('tablaProductos');
                    if (!d || d.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">No tienes productos registrados</td></tr>';
                        return;
                    }
                    tbody.innerHTML = d.map(p => `
                        <tr>
                            <td>${p.idProducto}</td>
                            <td><strong>${p.nombreProducto || '-'}</strong></td>
                            <td><span class="badge badge-info">${p.codigoBarras || '-'}</span></td>
                            <td>${p.categoria?.nombreCategoria || '-'}</td>
                            <td>S/ ${p.precioVenta?.toFixed(2) || '0.00'}</td>
                            <td>
                                <span class="badge ${p.activo ? 'badge-success' : 'badge-danger'}">
                                    ${p.activo ? 'Activo' : 'Inactivo'}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-primary btn-sm" onclick="editarProducto(${p.idProducto})">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                })
                .catch(err => {
                    console.error('❌ Error:', err);
                    document.getElementById('tablaProductos').innerHTML = 
                        '<tr><td colspan="7" style="text-align:center;padding:40px;color:red;">Error al cargar productos</td></tr>';
                });
        }

        function editarProducto(id) {
            alert('📦 Editar producto ID: ' + id + '\n(En desarrollo)');
        }

        window.cargarProductos = cargarProductos;

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            cargarProductos();
        } else {
            document.addEventListener('DOMContentLoaded', cargarProductos);
        }
    })();
</script>
</body>
</html>
