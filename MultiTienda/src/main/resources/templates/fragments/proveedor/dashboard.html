<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<div class="page-header">
    <div>
        <div class="page-title">📊 Dashboard</div>
        <div class="page-subtitle">Bienvenido, <span th:text="${usuario.nombres}"></span> <span th:text="${usuario.apellidos}"></span></div>
    </div>
    <div class="page-header-right">
        <span class="badge badge-primary">Rol: <span th:text="${userRole}"></span></span>
    </div>
</div>

<!-- ============================================================ -->
<!-- KPIS (SOLO 3 - LO QUE PUEDE VER EL PROVEEDOR) -->
<!-- ============================================================ -->
<div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card">
        <div class="kpi-label"><i class="fas fa-box"></i> Mis Productos</div>		
        <div class="kpi-value" id="totalProductos">0</div>
        <div class="kpi-delta up"><i class="fas fa-arrow-up"></i> <span id="productosActivos">0</span> activos</div>
        <a href="#" onclick="cargarPagina('productos')" style="font-size:0.7rem;">Ver todos</a>
    </div>
    <div class="kpi-card">
        <div class="kpi-label"><i class="fas fa-clipboard-list"></i> Órdenes</div>
        <div class="kpi-value" id="totalOrdenes">0</div>
        <div class="kpi-delta warn"><i class="fas fa-clock"></i> <span id="ordenesPendientes">0</span> pendientes</div>
        <a href="#" onclick="cargarPagina('ordenes')" style="font-size:0.7rem;">Ver todos</a>
    </div>
   
</div>

<!-- ============================================================ -->
<!-- GRÁFICO DE ESTADO DE ÓRDENES -->
<!-- ============================================================ -->
<div class="card" style="margin-bottom:18px;">
    <div class="card-header">
        <div class="card-title">📊 Órdenes por estado</div>
        <a href="#" onclick="cargarPagina('ordenes')" style="font-size:0.7rem;">Ver todos</a>
    </div>
    <div class="card-body">
        <div id="graficoOrdenes" style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;padding:10px 0;">
            <p style="color:var(--text-muted);font-size:0.8rem;">Cargando...</p>
        </div>

        <!-- ============================================================ -->
        <!-- ESTADOS DE ÓRDENES -->
        <!-- ============================================================ -->
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:12px;border-top:1px solid var(--border-color);padding-top:14px;">
            <div style="background:var(--bg-card);border-radius:var(--radius-md);padding:10px;text-align:center;border:2px solid #F59E0B;">
                <span style="display:block;font-size:0.55rem;color:#F59E0B;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;">Pendiente</span>
                <span id="estadoPendiente" style="display:block;font-size:1.3rem;font-weight:700;color:#F59E0B;">0</span>
            </div>
            <div style="background:var(--bg-card);border-radius:var(--radius-md);padding:10px;text-align:center;border:2px solid #1976D2;">
                <span style="display:block;font-size:0.55rem;color:#1976D2;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;">Aprobada</span>
                <span id="estadoAprobada" style="display:block;font-size:1.3rem;font-weight:700;color:#1976D2;">0</span>
            </div>
            <div style="background:var(--bg-card);border-radius:var(--radius-md);padding:10px;text-align:center;border:2px solid #7C3AED;">
                <span style="display:block;font-size:0.55rem;color:#7C3AED;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;">Enviada</span>
                <span id="estadoEnviada" style="display:block;font-size:1.3rem;font-weight:700;color:#7C3AED;">0</span>
            </div>
            <div style="background:var(--bg-card);border-radius:var(--radius-md);padding:10px;text-align:center;border:2px solid #388E3C;">
                <span style="display:block;font-size:0.55rem;color:#388E3C;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;">Recibida</span>
                <span id="estadoRecibida" style="display:block;font-size:1.3rem;font-weight:700;color:#388E3C;">0</span>
            </div>
            <div style="background:var(--bg-card);border-radius:var(--radius-md);padding:10px;text-align:center;border:2px solid #D32F2F;">
                <span style="display:block;font-size:0.55rem;color:#D32F2F;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;">Cancelada</span>
                <span id="estadoCancelada" style="display:block;font-size:1.3rem;font-weight:700;color:#D32F2F;">0</span>
            </div>
            <div style="background:var(--bg-card);border-radius:var(--radius-md);padding:10px;text-align:center;border:2px solid #F59E0B;">
                <span style="display:block;font-size:0.55rem;color:#F59E0B;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;">Parcial</span>
                <span id="estadoParcial" style="display:block;font-size:1.3rem;font-weight:700;color:#F59E0B;">0</span>
            </div>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- LISTAS EN GRID DE 3 -->
<!-- ============================================================ -->
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:18px;">
    <!-- Últimos productos -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">🛒 Últimos productos</div>
            <a href="#" onclick="cargarPagina('productos')" style="font-size:0.7rem;">Ver todos</a>
        </div>
        <div class="card-body" style="padding:0;">
            <div id="listaProductos" style="padding:8px 12px;">
                <p style="color:var(--text-muted);font-size:0.75rem;">Cargando...</p>
            </div>
        </div>
    </div>

    <!-- Últimas órdenes -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">📋 Últimas órdenes</div>
            <a href="#" onclick="cargarPagina('ordenes')" style="font-size:0.7rem;">Ver todos</a>
        </div>
        <div class="card-body" style="padding:0;">
            <div id="listaOrdenes" style="padding:8px 12px;">
                <p style="color:var(--text-muted);font-size:0.75rem;">Cargando...</p>
            </div>
        </div>
    </div>

    
</div>

<script>
    function cargarDashboard() {
        // ============================================================
        // KPIs
        // ============================================================
        fetch('/api/productos')
            .then(r => r.json())
            .then(d => {
                document.getElementById('totalProductos').textContent = d.length || 0;
                document.getElementById('productosActivos').textContent = d.filter(p => p.activo === true).length || 0;
            })
            .catch(() => {
                document.getElementById('totalProductos').textContent = '?';
                document.getElementById('productosActivos').textContent = '?';
            });

        fetch('/api/ordenes')
            .then(r => r.json())
            .then(d => {
                document.getElementById('totalOrdenes').textContent = d.length || 0;
                const pendientes = d.filter(o => o.idEstadoOrdenCompra === 1 || o.idEstadoOrdenCompra === 2);
                document.getElementById('ordenesPendientes').textContent = pendientes.length || 0;
            })
            .catch(() => {
                document.getElementById('totalOrdenes').textContent = '?';
                document.getElementById('ordenesPendientes').textContent = '?';
            });

        fetch('/api/entregas')
            .then(r => r.json())
            .then(d => {
                document.getElementById('totalEntregas').textContent = d.length || 0;
                const completadas = d.filter(e => e.estado === 'ENTREGADO' || e.estado === 'COMPLETADO');
                document.getElementById('entregasCompletadas').textContent = completadas.length || 0;
            })
            .catch(() => {
                document.getElementById('totalEntregas').textContent = '?';
                document.getElementById('entregasCompletadas').textContent = '?';
            });

        // ============================================================
        // GRÁFICO DE ÓRDENES POR ESTADO
        // ============================================================
        fetch('/api/ordenes')
            .then(r => r.json())
            .then(d => {
                const contenedor = document.getElementById('graficoOrdenes');
                if (!d || d.length === 0) {
                    contenedor.innerHTML = '<p style="color:var(--text-muted);font-size:0.8rem;">Sin órdenes registradas</p>';
                    return;
                }

                const estados = {};
                const colores = {
                    'PENDIENTE': '#F59E0B',
                    'APROBADA': '#1976D2',
                    'ENVIADA': '#7C3AED',
                    'RECIBIDA': '#388E3C',
                    'CANCELADA': '#D32F2F',
                    'PARCIAL': '#F59E0B'
                };

                const estadoMap = {
                    1: 'PENDIENTE',
                    2: 'APROBADA',
                    3: 'ENVIADA',
                    4: 'RECIBIDA',
                    5: 'CANCELADA',
                    6: 'PARCIAL'
                };

                d.forEach(i => {
                    const idEstado = i.idEstadoOrdenCompra || 1;
                    const nombre = estadoMap[idEstado] || 'PENDIENTE';
                    estados[nombre] = (estados[nombre] || 0) + 1;
                });

                // Actualizar contadores de estado
                for (const [estado, cantidad] of Object.entries(estados)) {
                    const idMap = {
                        'PENDIENTE': 'estadoPendiente',
                        'APROBADA': 'estadoAprobada',
                        'ENVIADA': 'estadoEnviada',
                        'RECIBIDA': 'estadoRecibida',
                        'CANCELADA': 'estadoCancelada',
                        'PARCIAL': 'estadoParcial'
                    };
                    const elId = idMap[estado];
                    if (elId) document.getElementById(elId).textContent = cantidad;
                }

                const total = d.length;
                let html = '';
                for (const [estado, cantidad] of Object.entries(estados)) {
                    const porcentaje = ((cantidad / total) * 100).toFixed(1);
                    const color = colores[estado] || '#F59E0B';
                    html += `
                        <div style="display:flex;flex-direction:column;align-items:center;min-width:60px;">
                            <div style="width:50px;height:50px;border-radius:50%;background:conic-gradient(${color} 0% ${porcentaje}%, #E5E7EB ${porcentaje}% 100%);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--text-primary);">
                                <span style="background:var(--bg-card);padding:2px 6px;border-radius:99px;">${cantidad}</span>
                            </div>
                            <span style="font-size:0.6rem;color:var(--text-muted);margin-top:4px;text-align:center;">${estado}</span>
                        </div>
                    `;
                }
                contenedor.innerHTML = html;
            })
            .catch(() => {
                document.getElementById('graficoOrdenes').innerHTML = '<p style="color:var(--text-muted);font-size:0.8rem;">Error al cargar</p>';
            });

        // ============================================================
        // LISTAS (3 registros por lista)
        // ============================================================
        function renderizarLista(id, datos, campoNombre, mostrarEstado) {
            const contenedor = document.getElementById(id);
            if (!contenedor) return;
            if (!datos || datos.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-muted);font-size:0.75rem;padding:4px 0;">Sin registros</p>';
                return;
            }
            const items = datos.slice(0, 3);
            contenedor.innerHTML = items.map(item => {
                const nombre = item[campoNombre] || 'Sin nombre';
                let estadoHtml = '';
                if (mostrarEstado) {
                    const activo = item.activo === true;
                    estadoHtml = `<span class="badge ${activo ? 'badge-success' : 'badge-danger'}" style="font-size:0.6rem;">${activo ? 'Activo' : 'Inactivo'}</span>`;
                }
                return `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border-color);font-size:0.78rem;">
                        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%;">${nombre}</span>
                        ${estadoHtml}
                    </div>
                `;
            }).join('');
        }

        // Últimos productos
        fetch('/api/productos')
            .then(r => r.json())
            .then(d => renderizarLista('listaProductos', d.slice(-3).reverse(), 'nombreProducto', true))
            .catch(() => document.getElementById('listaProductos').innerHTML = '<p style="color:var(--text-muted);font-size:0.75rem;">Error</p>');

        // Últimas órdenes
        fetch('/api/ordenes')
            .then(r => r.json())
            .then(d => renderizarLista('listaOrdenes', d.slice(-3).reverse(), 'codigoOrden', false))
            .catch(() => document.getElementById('listaOrdenes').innerHTML = '<p style="color:var(--text-muted);font-size:0.75rem;">Error</p>');

        // Últimas entregas
        fetch('/api/entregas')
            .then(r => r.json())
            .then(d => renderizarLista('listaEntregas', d.slice(-3).reverse(), 'codigoEntrega', false))
            .catch(() => document.getElementById('listaEntregas').innerHTML = '<p style="color:var(--text-muted);font-size:0.75rem;">Error</p>');
    }

    document.addEventListener('DOMContentLoaded', cargarDashboard);
</script>
</body>
</html>
